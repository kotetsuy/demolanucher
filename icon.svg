<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d2d5f"/>
    </linearGradient>
    <linearGradient id="play" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bg)" stroke="#333355" stroke-width="2"/>

  <circle cx="128" cy="120" r="62" fill="none" stroke="#4fc3f7" stroke-width="3" opacity="0.35"/>
  <circle cx="128" cy="120" r="74" fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.18"/>

  <g filter="url(#glow)">
    <polygon points="108,86 108,154 168,120" fill="url(#play)"/>
  </g>

  <g>
    <circle cx="76"  cy="200" r="14" fill="#2e7d32"/>
    <circle cx="128" cy="200" r="14" fill="#1565c0"/>
    <circle cx="180" cy="200" r="14" fill="#6a1b9a"/>
    <circle cx="76"  cy="200" r="5" fill="#a5d6a7"/>
    <circle cx="128" cy="200" r="5" fill="#90caf9"/>
    <circle cx="180" cy="200" r="5" fill="#ce93d8"/>
  </g>

  <text x="128" y="56" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" letter-spacing="2">DEMO</text>
</svg>
